<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Admin Panel - Database Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        #toast { visibility: hidden; position: fixed; bottom: 20px; right: 20px; background: #388E3C; color: #fff; padding: 12px 24px; border-radius: 4px; z-index: 2000; transition: opacity 0.3s; opacity: 0; font-weight: 500;}
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <div class="bg-[#2874F0] text-white p-4 shadow-md flex items-center justify-between sticky top-0 z-50">
        <h1 class="text-xl font-bold italic tracking-wide">Flipkart <span class="text-[#FFE500]">Admin</span></h1>
        <div class="text-sm font-medium bg-white/20 px-3 py-1 rounded flex items-center">
            <span id="dbStatus" class="w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse"></span> Firebase Connected
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-8 bg-white p-6 md:p-8 rounded-lg shadow-lg mb-10">
        <h2 id="formTitle" class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Add New Product</h2>
        
        <form id="addProductForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                    <select id="category" required class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0]">
                        <option value="mobile">Mobiles</option>
                        <option value="electronics">Electronics</option>
                        <option value="appliance">Appliances</option>
                        <option value="fashion">Fashion</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                    <input type="text" id="name" required placeholder="e.g. Apple iPhone 15 Pro Max" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0]">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sub-Title / Color *</label>
                    <input type="text" id="sub" required placeholder="e.g. Titanium Black" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sale Price (₹) *</label>
                    <input type="number" id="price" required placeholder="e.g. 599" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Real MRP (₹) *</label>
                    <input type="number" id="mrp" required placeholder="e.g. 159900" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0]">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Image Links (Paste ImgBB HTML Code or Direct Links) *</label>
                <textarea id="images" required rows="3" placeholder='<a href="..."><img src="https://i.ibb.co/.../img.jpg"></a>' class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0] text-sm"></textarea>
                <p class="text-xs text-gray-500 mt-1">System will automatically extract the exact .jpg/.png links.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Highlights (Enter each on a NEW LINE) *</label>
                <textarea id="highlights" required rows="4" placeholder="256 GB ROM&#10;6.7 inch Display&#10;A17 Pro Chip" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-[#2874F0] text-sm leading-relaxed"></textarea>
            </div>

            <div class="flex items-center space-x-6 pt-2">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="inStock" checked class="w-4 h-4 accent-[#2874F0]">
                    <span class="text-sm font-medium text-gray-700">In Stock</span>
                </label>
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-gray-700">Rating:</label>
                    <input type="number" id="rating" step="0.1" max="5" min="1" value="4.5" class="w-20 border border-gray-300 rounded p-1 text-center outline-none focus:border-[#2874F0]">
                </div>
            </div>

            <div class="flex space-x-4">
                <button type="button" id="cancelEditBtn" class="hidden w-1/3 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded shadow transition duration-200 mt-4" onclick="cancelEdit()">Cancel Edit</button>
                <button type="submit" id="submitBtn" class="flex-1 bg-[#fb641b] hover:bg-[#f05a12] text-white font-bold py-3 rounded shadow transition duration-200 mt-4">
                    Upload Product to Database
                </button>
            </div>
        </form>
    </div>

    <!-- Product History / Manage Section -->
    <div class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-lg shadow-lg">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h2 class="text-xl font-bold text-gray-800">Manage Uploaded Products</h2>
            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded" id="totalCount">Total: 0</span>
        </div>
        <div id="adminProductList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
            <div class="text-center text-gray-500 py-10"><i class="ph-fill ph-spinner-gap animate-spin text-3xl"></i><p>Loading database...</p></div>
        </div>
    </div>

    <div id="toast">Message here</div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // User's Provided Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyD6Wcy9RcNQq6d35gOtW4c5Oyropkflr_k",
          authDomain: "online-shopping-1b298.firebaseapp.com",
          databaseURL: "https://online-shopping-1b298-default-rtdb.firebaseio.com",
          projectId: "online-shopping-1b298",
          storageBucket: "online-shopping-1b298.firebasestorage.app",
          messagingSenderId: "514600292582",
          appId: "1:514600292582:web:3bef8ed527250b4de4eb27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let editingId = null;
        let productsData = {};

        // Parse ImgBB HTML or Direct Links
        function extractImages(inputStr) {
            const regex = /(https?:\/\/[^"'>\s]+\.(?:jpg|jpeg|gif|png|webp))/gi;
            const matches = inputStr.match(regex);
            if (matches) return [...new Set(matches)]; // Unique links only
            return inputStr.split(/[\n,]/).map(s => s.trim()).filter(s => s.startsWith('http'));
        }

        // Form Submit
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = editingId ? "Updating..." : "Uploading..."; 
            btn.disabled = true; btn.classList.add("opacity-50");

            const highlightsArray = document.getElementById('highlights').value.split('\n').map(s => s.trim()).filter(s => s);
            const imagesArray = extractImages(document.getElementById('images').value);

            if(imagesArray.length === 0) {
                alert("Valid Image link nahi mili. Please check image code.");
                btn.innerText = editingId ? "Update Product" : "Upload Product to Database"; btn.disabled = false; btn.classList.remove("opacity-50");
                return;
            }

            const productId = editingId || Date.now();
            const productData = {
                id: productId,
                category: document.getElementById('category').value,
                name: document.getElementById('name').value.trim(),
                sub: document.getElementById('sub').value.trim(),
                price: Number(document.getElementById('price').value),
                mrp: Number(document.getElementById('mrp').value),
                images: imagesArray,
                highlights: highlightsArray,
                inStock: document.getElementById('inStock').checked,
                rating: Number(document.getElementById('rating').value)
            };

            try {
                if (editingId) {
                    await update(ref(db, 'products/' + editingId), productData);
                    showToast("Product Updated Successfully!", "bg-blue-600");
                    window.cancelEdit();
                } else {
                    await set(ref(db, 'products/' + productId), productData);
                    showToast("Product Uploaded Successfully!", "bg-green-600");
                    document.getElementById('addProductForm').reset();
                }
            } catch (error) {
                console.error("Error:", error); alert("Operation Failed! Check Firebase Rules.");
            } finally {
                btn.innerText = editingId ? "Update Product" : "Upload Product to Database"; 
                btn.disabled = false; btn.classList.remove("opacity-50");
            }
        });

        // Load Products into Admin List
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            const listEl = document.getElementById('adminProductList');
            
            if (data) {
                productsData = data;
                const products = Object.values(data).reverse(); 
                document.getElementById('totalCount').innerText = `Total: ${products.length}`;
                
                listEl.innerHTML = products.map(p => `
                    <div class="flex items-center justify-between border border-gray-200 p-3 rounded hover:bg-gray-50 transition">
                        <div class="flex items-center space-x-4 w-2/3">
                            <img src="${p.images[0]}" class="w-12 h-12 object-contain bg-white border rounded p-1">
                            <div>
                                <h3 class="text-sm font-bold text-gray-800 line-clamp-1">${p.name}</h3>
                                <p class="text-xs text-gray-500">₹${p.price.toLocaleString()} | Category: <span class="uppercase">${p.category}</span></p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="window.editProduct(${p.id})" class="text-blue-600 hover:bg-blue-100 p-2 rounded transition"><i class="ph-bold ph-pencil-simple"></i></button>
                            <button onclick="window.deleteProduct(${p.id})" class="text-red-600 hover:bg-red-100 p-2 rounded transition"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('totalCount').innerText = `Total: 0`;
                listEl.innerHTML = '<p class="text-center text-gray-500 py-4">No products in Database.</p>';
            }
        });

        window.editProduct = function(id) {
            const p = productsData[id];
            if(!p) return;
            editingId = id;
            document.getElementById('formTitle').innerText = "Edit Product";
            document.getElementById('formTitle').classList.add('text-blue-600');
            document.getElementById('submitBtn').innerText = "Update Product";
            document.getElementById('submitBtn').classList.replace('bg-[#fb641b]', 'bg-blue-600');
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            document.getElementById('category').value = p.category;
            document.getElementById('name').value = p.name;
            document.getElementById('sub').value = p.sub;
            document.getElementById('price').value = p.price;
            document.getElementById('mrp').value = p.mrp;
            document.getElementById('images').value = p.images.join('\n');
            document.getElementById('highlights').value = p.highlights.join('\n');
            document.getElementById('inStock').checked = p.inStock;
            document.getElementById('rating').value = p.rating;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = function() {
            editingId = null;
            document.getElementById('addProductForm').reset();
            document.getElementById('formTitle').innerText = "Add New Product";
            document.getElementById('formTitle').classList.remove('text-blue-600');
            document.getElementById('submitBtn').innerText = "Upload Product to Database";
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-[#fb641b]');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        };

        window.deleteProduct = async function(id) {
            if(confirm("Are you sure you want to DELETE this product?")) {
                try {
                    await remove(ref(db, 'products/' + id));
                    showToast("Product Deleted", "bg-red-600");
                    if(editingId === id) window.cancelEdit();
                } catch(e) { alert("Delete failed"); }
            }
        };

        function showToast(msg, bgClass) {
            const t = document.getElementById("toast"); 
            t.innerText = msg; 
            t.className = `fixed bottom-20 right-4 text-white px-6 py-3 rounded shadow-lg z-[2000] transition-opacity duration-300 opacity-100 ${bgClass}`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
